services:
  - type: web
    name: pubg-api
    runtime: node
    plan: free
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SAME_ORIGIN_DEPLOYMENT
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      #
      # ── IMPORTANT: Do NOT add these ────────────────────────────────────────
      #
      # FRONTEND_URL  → not needed in same-origin mode (no CORS required)
      # VITE_API_URL  → MUST NOT be set — will break mobile login on iOS Safari
      #                 and trigger a build failure in render-build.sh
      #
