services:
  - type: web
    name: pubg-account-manager-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
