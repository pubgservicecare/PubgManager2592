<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Primary SEO -->
    <title>PUBG Account Manager — Premium Verified PUBG Mobile Accounts</title>
    <meta name="description" content="Pakistan's trusted marketplace for premium PUBG Mobile accounts. Buy verified accounts with rare skins, mythic items, X-Suits, and Glacier weapons. Secure transfer guaranteed." />
    <meta name="keywords" content="pubg accounts, pubg mobile accounts pakistan, buy pubg account, mythic accounts, x-suit account, glacier m416, pubg marketplace, rare pubg accounts" />
    <meta name="author" content="PUBG Account Manager" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.codexstocks.org/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PUBG Account Manager" />
    <meta property="og:title" content="PUBG Account Manager — Premium Verified Accounts" />
    <meta property="og:description" content="Pakistan's trusted marketplace for premium PUBG Mobile accounts. Verified, secure, instant transfer." />
    <meta property="og:image" content="https://www.codexstocks.org/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://www.codexstocks.org/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PUBG Account Manager" />
    <meta name="twitter:description" content="Premium verified PUBG Mobile accounts marketplace." />
    <meta name="twitter:image" content="https://www.codexstocks.org/opengraph.jpg" />

    <!-- Structured Data: Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "PUBG Account Manager",
      "description": "Pakistan's trusted marketplace for premium verified PUBG Mobile accounts.",
      "url": "https://www.codexstocks.org",
      "logo": "https://www.codexstocks.org/favicon.svg",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PUBG Account Manager",
      "url": "https://www.codexstocks.org",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.codexstocks.org/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Non-blocking font loading: preconnect first, then load async -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load both font families in a single request to reduce round-trips -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
