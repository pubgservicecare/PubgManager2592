<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Amber background matching brand primary hsl(40 100% 50%) = #FFAA00 -->
  <rect width="512" height="512" rx="96" fill="#FFAA00"/>
  <!-- Gamepad2 icon from lucide-react, scaled 12.5x and centred -->
  <!-- Native 24x24 → 300x300 · offset = (512-300)/2 = 106 -->
